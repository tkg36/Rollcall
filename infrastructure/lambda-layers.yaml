AWSTemplateFormatVersion: '2010-09-09'
Description: Custom Lambda layers for the RollCall pipeline

# Public AWS-managed layers are referenced directly by ARN in Lambda templates.
# This template manages only the account-owned custom layers.

Parameters:
  ArtifactsBucket:
    Type: String
    Description: S3 bucket where layer zips are uploaded before this stack is deployed

Resources:

  # PyMySQL for Python 3.12 — used by rollcall-lambda
  PyMySQLLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: PyMySQL-Layer
      Description: PyMySQL driver for MySQL connectivity from Lambda
      CompatibleRuntimes:
        - python3.12
      CompatibleArchitectures:
        - x86_64
      Content:
        S3Bucket: !Ref ArtifactsBucket
        S3Key: layers/PyMySQL-Layer.zip

  # numpy for Python 3.12
  NumpyLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: numpy
      Description: numpy for Python 3.12
      CompatibleRuntimes:
        - python3.12
      CompatibleArchitectures:
        - x86_64
      Content:
        S3Bucket: !Ref ArtifactsBucket
        S3Key: layers/numpy.zip

Outputs:
  PyMySQLLayerArn:
    Value: !Ref PyMySQLLayer
    Export:
      Name: rollcall-pymysql-layer-arn

  NumpyLayerArn:
    Value: !Ref NumpyLayer
    Export:
      Name: rollcall-numpy-layer-arn

# Public layers referenced in Lambda templates (not managed here):
#   AWSSDKPandas-Python312:24  -> arn:aws:lambda:us-east-1:336392948345:layer:AWSSDKPandas-Python312:24
#   AWSSDKPandas-Python314:7   -> arn:aws:lambda:us-east-1:336392948345:layer:AWSSDKPandas-Python314:7
