AWSTemplateFormatVersion: '2010-09-09'
Description: RDS MySQL instance and proxy for the RollCall pipeline

# rollcall-lambda connects via the proxy using IAM auth (rds-db:connect).
# Credentials stored in Secrets Manager; proxy uses MYSQL_CACHING_SHA2_PASSWORD.

Parameters:
  DBMasterPassword:
    Type: String
    NoEcho: true
    Description: Master password for the rollcalldb MySQL instance

Resources:

  RollCallDB:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    Properties:
      DBInstanceIdentifier: rollcalldb
      DBInstanceClass: db.t3.small
      Engine: mysql
      MasterUsername: admin
      MasterUserPassword: !Ref DBMasterPassword
      MultiAZ: false
      StorageType: gp2
      DBSubnetGroupName: default-vpc-05962bd16e7adad06
      VPCSecurityGroups:
        - sg-089c37a1aea18eb32
        - sg-00e3cd51ae66fe1b9
        - sg-02835fd2ed3f1bc52
        - sg-0671a7008c31a028e
        - sg-05ab0abead882f17a

  # Active proxy used by rollcall-lambda (referenced in LambdaRDSAuthentication policy)
  RollCallDBProxy:
    Type: AWS::RDS::DBProxy
    Properties:
      DBProxyName: proxy-1772133904467-rollcalldb
      EngineFamily: MYSQL
      RoleArn: !Sub arn:aws:iam::${AWS::AccountId}:role/service-role/rds-proxy-role-1772133904467
      Auth:
        - AuthScheme: SECRETS
          SecretArn: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:rds-db-credentials/rollcalldb/dbuser/1772133904467-j7PXEN
          IAMAuth: DISABLED
          ClientPasswordAuthType: MYSQL_CACHING_SHA2_PASSWORD
      VpcSubnetIds:
        - subnet-02d9aced436473d0e
        - subnet-0925b3a575d26bbc5
        - subnet-0bdc6bf79b8c1b29e
        - subnet-0525f39da4ffb2e4d
        - subnet-05a27cfc9ecb6be08
      VpcSecurityGroupIds:
        - sg-005283d22a17c6e02
      RequireTLS: false
      IdleClientTimeout: 1800
      DebugLogging: false

  RollCallDBProxyTargetGroup:
    Type: AWS::RDS::DBProxyTargetGroup
    Properties:
      DBProxyName: !Ref RollCallDBProxy
      TargetGroupName: default
      DBInstanceIdentifiers:
        - !Ref RollCallDB

Outputs:
  DBEndpoint:
    Value: !GetAtt RollCallDB.Endpoint.Address
    Export:
      Name: rollcalldb-endpoint

  ProxyEndpoint:
    Value: !GetAtt RollCallDBProxy.Endpoint
    Export:
      Name: rollcalldb-proxy-endpoint
