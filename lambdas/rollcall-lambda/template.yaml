AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: rollcall-lambda — processes XLSX recruitment reports, writes output workbook to rollcall-s3-dev-depts-reference

# Handler: lambda_function.lambda_handler
# Trigger:  SQS rollcall-sqs (from SNS dataReceived, published by csvParser)
# Output:   ESF WF data file.xlsx written to rollcall-s3-dev-depts-reference/{retAddr}/
# Source:   https://github.com/Brandon-Wang-CC/RollCall

Parameters:
  CsvBucket:
    Type: String
    Description: S3 bucket for processed XLSX attachments (csvParser writes, rollcall-lambda reads)
  DeptsBucket:
    Type: String
    Description: S3 bucket for reference data and output workbook

Resources:

  RollCallLambdaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: rollcall-lambda
      Handler: lambda_function.lambda_handler
      Runtime: python3.12
      CodeUri: ./
      MemorySize: 1024
      Timeout: 300
      Role: !Sub arn:aws:iam::${AWS::AccountId}:role/service-role/rollcall-lambda-role-y37lw2l9
      Layers:
        - !Sub arn:aws:lambda:${AWS::Region}:336392948345:layer:AWSSDKPandas-Python312:24
      Environment:
        Variables:
          CSV_BUCKET: !Ref CsvBucket
          DEPTS_BUCKET: !Ref DeptsBucket
      Architectures:
        - x86_64
      EphemeralStorage:
        Size: 1024
      Events:
        SQSTrigger:
          Type: SQS
          Properties:
            Queue: !Sub arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:rollcall-sqs
            BatchSize: 10
      LoggingConfig:
        LogFormat: Text
        LogGroup: /aws/lambda/rollcall-lambda

Outputs:
  RollCallLambdaArn:
    Value: !GetAtt RollCallLambdaFunction.Arn
    Export:
      Name: rollcall-lambda-arn
