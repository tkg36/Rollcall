name: Deploy

on:
  workflow_dispatch:
  # push:
  #   branches:
  #     - master

jobs:
  # ── Read both config files and expose values to the deploy job ───────────────
  load-config:
    runs-on: ubuntu-latest
    outputs:
      aws-region:        ${{ steps.read.outputs.aws-region }}
      oidc-role-arn:     ${{ steps.read.outputs.oidc-role-arn }}
      stack-iam:         ${{ steps.read.outputs.stack-iam }}
      stack-s3:          ${{ steps.read.outputs.stack-s3 }}
      stack-sns:         ${{ steps.read.outputs.stack-sns }}
      stack-sqs:         ${{ steps.read.outputs.stack-sqs }}
      stack-ses:         ${{ steps.read.outputs.stack-ses }}
      stack-cloudwatch:  ${{ steps.read.outputs.stack-cloudwatch }}
      stack-csv-parser:  ${{ steps.read.outputs.stack-csv-parser }}
      stack-rollcall:    ${{ steps.read.outputs.stack-rollcall }}
      stack-ses-emailer: ${{ steps.read.outputs.stack-ses-emailer }}
      csv-bucket:        ${{ steps.read.outputs.csv-bucket }}
      depts-bucket:      ${{ steps.read.outputs.depts-bucket }}
      ses-bucket:        ${{ steps.read.outputs.ses-bucket }}
      sender-domain:              ${{ steps.read.outputs.sender-domain }}
      sender-email:               ${{ steps.read.outputs.sender-email }}
      file-prefix-unfilled:       ${{ steps.read.outputs.file-prefix-unfilled }}
      file-prefix-contractor-open: ${{ steps.read.outputs.file-prefix-contractor-open }}
      file-prefix-contractor-closed: ${{ steps.read.outputs.file-prefix-contractor-closed }}
      file-prefix-candidates:     ${{ steps.read.outputs.file-prefix-candidates }}
      alarm-email:                ${{ steps.read.outputs.alarm-email }}
      md1-name:                   ${{ steps.read.outputs.md1-name }}

    steps:
      - uses: actions/checkout@v4

      - id: read
        name: Parse deploy-config.yaml and user-settings.yaml
        run: |
          python3 << 'EOF'
          import yaml, os, re

          def codeowners_email(path):
              with open(path) as f:
                  for line in f:
                      line = line.strip()
                      if line and not line.startswith('#'):
                          for token in line.split()[1:]:
                              if re.match(r'^[^@]+@[^@]+\.[^@]+$', token):
                                  return token
              raise ValueError('No email found in CODEOWNERS')

          config   = yaml.safe_load(open('.github/deploy-config.yaml'))
          settings = yaml.safe_load(open('user-settings.yaml'))

          outputs = {
            'aws-region':        config['aws']['region'],
            'oidc-role-arn':     config['aws']['oidcRoleArn'],
            'stack-iam':         config['stacks']['iam'],
            'stack-s3':          config['stacks']['s3'],
            'stack-sns':         config['stacks']['sns'],
            'stack-sqs':         config['stacks']['sqs'],
            'stack-ses':         config['stacks']['ses'],
            'stack-cloudwatch':  config['stacks']['cloudwatch'],
            'stack-csv-parser':  config['stacks']['csvParser'],
            'stack-rollcall':    config['stacks']['rollcallLambda'],
            'stack-ses-emailer': config['stacks']['sesEmailer'],
            'csv-bucket':        settings['CsvBucket'],
            'depts-bucket':      settings['DeptsBucket'],
            'ses-bucket':        settings['SesBucket'],
            'sender-domain':              settings['SenderDomain'],
            'sender-email':               settings['SenderEmail'],
            'file-prefix-unfilled':       settings['FilePrefixUnfilled'],
            'file-prefix-contractor-open':  settings['FilePrefixContractorOpen'],
            'file-prefix-contractor-closed': settings['FilePrefixContractorClosed'],
            'file-prefix-candidates':     settings['FilePrefixCandidates'],
            'alarm-email':                codeowners_email('.github/CODEOWNERS'),
            'md1-name':                   settings['MD1Name'],
          }

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            for k, v in outputs.items():
              f.write(f'{k}={v}\n')
          EOF

  # ── Deploy all stacks in dependency order, then run post-deploy steps ────────
  deploy:
    needs: load-config
    runs-on: ubuntu-latest
    environment: production

    env:
      AWS_REGION:        ${{ needs.load-config.outputs.aws-region }}
      CSV_BUCKET:        ${{ needs.load-config.outputs.csv-bucket }}
      DEPTS_BUCKET:      ${{ needs.load-config.outputs.depts-bucket }}
      SES_BUCKET:        ${{ needs.load-config.outputs.ses-bucket }}
      SENDER_DOMAIN:     ${{ needs.load-config.outputs.sender-domain }}
      SENDER_EMAIL:      ${{ needs.load-config.outputs.sender-email }}
      STACK_IAM:         ${{ needs.load-config.outputs.stack-iam }}
      STACK_S3:          ${{ needs.load-config.outputs.stack-s3 }}
      STACK_SNS:         ${{ needs.load-config.outputs.stack-sns }}
      STACK_SQS:         ${{ needs.load-config.outputs.stack-sqs }}
      STACK_SES:         ${{ needs.load-config.outputs.stack-ses }}
      STACK_CLOUDWATCH:  ${{ needs.load-config.outputs.stack-cloudwatch }}
      STACK_CSV_PARSER:  ${{ needs.load-config.outputs.stack-csv-parser }}
      STACK_ROLLCALL:    ${{ needs.load-config.outputs.stack-rollcall }}
      STACK_SES_EMAILER:              ${{ needs.load-config.outputs.stack-ses-emailer }}
      FILE_PREFIX_UNFILLED:           ${{ needs.load-config.outputs.file-prefix-unfilled }}
      FILE_PREFIX_CONTRACTOR_OPEN:    ${{ needs.load-config.outputs.file-prefix-contractor-open }}
      FILE_PREFIX_CONTRACTOR_CLOSED:  ${{ needs.load-config.outputs.file-prefix-contractor-closed }}
      FILE_PREFIX_CANDIDATES:         ${{ needs.load-config.outputs.file-prefix-candidates }}
      ALARM_EMAIL:                    ${{ needs.load-config.outputs.alarm-email }}
      MD1_NAME:                       ${{ needs.load-config.outputs.md1-name }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ needs.load-config.outputs.oidc-role-arn }}
          aws-region:     ${{ needs.load-config.outputs.aws-region }}

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      # ── Infrastructure ────────────────────────────────────────────────────────

      - name: Deploy IAM roles
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/iam.yaml \
            --stack-name $STACK_IAM \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides CsvBucket=$CSV_BUCKET DeptsBucket=$DEPTS_BUCKET SesBucket=$SES_BUCKET \
            --no-fail-on-empty-changeset

      - name: Deploy S3 buckets
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/s3.yaml \
            --stack-name $STACK_S3 \
            --parameter-overrides CsvBucket=$CSV_BUCKET DeptsBucket=$DEPTS_BUCKET SesBucket=$SES_BUCKET \
            --no-fail-on-empty-changeset

      - name: Upload reference data to S3
        run: |
          aws s3 sync reference-data/ s3://$DEPTS_BUCKET/ --exact-timestamps

      - name: Deploy SNS topics
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/sns.yaml \
            --stack-name $STACK_SNS \
            --parameter-overrides AlarmEmail="$ALARM_EMAIL" \
            --no-fail-on-empty-changeset

      - name: Deploy SQS queues
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/sqs.yaml \
            --stack-name $STACK_SQS \
            --no-fail-on-empty-changeset

      - name: Deploy SES receipt rules
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/ses.yaml \
            --stack-name $STACK_SES \
            --parameter-overrides SenderDomain=$SENDER_DOMAIN SesBucket=$SES_BUCKET \
            --no-fail-on-empty-changeset

      # ── Lambda functions ──────────────────────────────────────────────────────

      - name: SAM build
        run: |
          sam build --template lambdas/csv-parser/template.yaml      --build-dir .aws-sam/csv-parser
          sam build --template lambdas/rollcall-lambda/template.yaml  --build-dir .aws-sam/rollcall-lambda
          sam build --template lambdas/ses-emailer/template.yaml      --build-dir .aws-sam/ses-emailer

      - name: Deploy csvParser
        run: |
          sam deploy \
            --template-file .aws-sam/csv-parser/template.yaml \
            --stack-name $STACK_CSV_PARSER \
            --region $AWS_REGION \
            --resolve-s3 \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides CsvBucket=$CSV_BUCKET \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

      - name: Deploy rollcall-lambda
        run: |
          sam deploy \
            --template-file .aws-sam/rollcall-lambda/template.yaml \
            --stack-name $STACK_ROLLCALL \
            --region $AWS_REGION \
            --resolve-s3 \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              CsvBucket=$CSV_BUCKET \
              DeptsBucket=$DEPTS_BUCKET \
              FilePrefixUnfilled="$FILE_PREFIX_UNFILLED" \
              FilePrefixContractorOpen="$FILE_PREFIX_CONTRACTOR_OPEN" \
              FilePrefixContractorClosed="$FILE_PREFIX_CONTRACTOR_CLOSED" \
              FilePrefixCandidates="$FILE_PREFIX_CANDIDATES" \
              MD1Name="$MD1_NAME" \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

      - name: Deploy ses-emailer
        run: |
          sam deploy \
            --template-file .aws-sam/ses-emailer/template.yaml \
            --stack-name $STACK_SES_EMAILER \
            --region $AWS_REGION \
            --resolve-s3 \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides SenderEmail=$SENDER_EMAIL DeptsBucket=$DEPTS_BUCKET \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

      # ── CloudWatch alarms ─────────────────────────────────────────────────────

      - name: Deploy CloudWatch alarms
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/cloudwatch.yaml \
            --stack-name $STACK_CLOUDWATCH \
            --no-fail-on-empty-changeset

      # ── Post-deploy ───────────────────────────────────────────────────────────

      - name: Activate SES receipt rule set
        run: |
          aws ses set-active-receipt-rule-set \
            --rule-set-name DeliverToS3 \
            --region $AWS_REGION
